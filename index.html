<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puelche HC — Gestión de Procesos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;
  --surface:#FFFFFF;
  --surface2:#F0EEE9;
  --border:#D8D5CE;
  --border2:#C8C5BD;
  --text:#1A1917;
  --text2:#5C5A55;
  --text3:#9A9891;
  --accent:#1A6B4A;
  --accent-bg:#E5F4EE;
  --blue:#1A4D8F;
  --blue-bg:#E5EEFA;
  --amber:#7A4F0A;
  --amber-bg:#FDF0D8;
  --purple:#4A3A8F;
  --purple-bg:#EEEAF8;
  --red:#8F1A1A;
  --red-bg:#FAE5E5;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:8px;
  --radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;color:var(--text);flex:1;white-space:nowrap}
.logo span{color:var(--accent)}
.tabs{display:flex;gap:2px}
.tab{padding:6px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--text2);transition:all .15s}
.tab:hover{background:var(--surface2)}
.tab.active{background:var(--text);color:#fff}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;background:var(--surface);color:var(--text);transition:all .15s;display:flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--border2);background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#155c3f}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:#F09595}
.btn-danger:hover{background:var(--red-bg)}

/* FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:95}
.filters select,.filters input[type=text]{font-size:13px;padding:5px 9px;height:32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none}
.filters select:focus,.filters input:focus{border-color:var(--accent)}
.cnt{font-size:12px;color:var(--text3);margin-left:auto}

/* CONTENT */
.content{padding:14px 16px}

/* TABLE */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 160px);border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);width:100%}
.table-wrap thead th{position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;font-size:11px;color:var(--text2);white-space:nowrap}
th.sort{cursor:pointer}
th.sort:hover{color:var(--text)}
td{padding:0;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.cell{padding:7px 8px;min-height:34px;display:flex;align-items:center;gap:4px}
/* Editable */
.editable{cursor:pointer}
.editable:hover .cell{background:#F5F4F0;border-radius:4px}
.editable:hover .cell::after{content:'✎';font-size:10px;color:var(--text3);margin-left:auto;flex-shrink:0}
/* Inline inputs */
.cell-input{width:100%;padding:5px 7px;border:2px solid var(--accent);border-radius:5px;background:#fff;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.cell-select{width:100%;padding:4px 6px;border:2px solid var(--accent);border-radius:5px;background:#fff;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.cell-date{width:100%;padding:4px 6px;border:2px solid var(--accent);border-radius:5px;background:#fff;color:var(--text);font-size:12px;outline:none}
/* cons editor */
.cons-editor{padding:6px 8px;display:flex;flex-direction:column;gap:4px;background:#F5F9F7;border-radius:4px}
.cons-row{display:flex;gap:5px;align-items:center}
.cons-lbl{font-size:10px;font-weight:600;color:var(--text2);min-width:18px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.b-cerrado{background:var(--blue-bg);color:var(--blue)}
.b-suspendido{background:var(--amber-bg);color:var(--amber)}
.b-inicio{background:var(--purple-bg);color:var(--purple)}
.b-medio{background:#E0F0FF;color:#1A5A8F}
.b-final{background:var(--accent-bg);color:var(--accent)}
.b-aprobacion{background:var(--amber-bg);color:var(--amber)}
.b-vacio{background:var(--surface2);color:var(--text3)}
.b-activo{background:var(--accent-bg);color:var(--accent)}
.cons-pill{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;margin:1px;background:#E8F5F0;border:1px solid #A8D8C8;color:#1A6B53}
.cons-pill.ap{background:#FEF3E2;border:1px solid #F5C97A;color:#8A5C00}
.hint{font-size:12px;color:var(--text3)}
.del-btn{opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:3px 6px;border-radius:4px}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
tr:hover .del-btn{opacity:1}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,18,15,0.55);z-index:300;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:96%;max-width:460px;margin-bottom:40px;box-shadow:var(--shadow)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:600}
.mc{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;line-height:1;padding:0 4px;border-radius:4px}
.mc:hover{color:var(--text);background:var(--surface2)}
.nf{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.nf label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.nf select,.nf input{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.nf select:focus,.nf input:focus{border-color:var(--accent)}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.form-sep{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;padding-top:14px;border-top:1px solid var(--border)}

/* DETAIL MODAL */
.dm{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;width:96%;max-width:580px;margin-bottom:40px;box-shadow:var(--shadow)}
/* Timeline */
.tl-wrap{background:var(--surface2);border-radius:var(--radius);padding:14px 12px;margin:14px 0}
.tl{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:76px}
.tl-conn{display:flex;align-items:center;flex:1}
.tl-line{flex:1;height:2px;background:var(--border)}
.tl-line.done{background:var(--accent)}
.tl-dot{width:13px;height:13px;border-radius:50%;background:var(--border);border:2px solid var(--border);flex-shrink:0}
.tl-dot.done{background:var(--accent);border-color:var(--accent)}
.tl-dot.next{background:#fff;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.tl-lbl{font-size:10px;color:var(--text2);text-align:center;margin-top:6px;line-height:1.3;font-weight:500}
.tl-dt{font-size:10px;color:var(--text3);text-align:center;margin-top:2px;font-weight:600}
.d-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.d-field label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px}
.d-field span{font-size:13px}
.cand-box{background:var(--accent-bg);border:1px solid #B8DCCA;border-radius:var(--radius);padding:10px 12px;margin:10px 0}
.cand-box label{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;display:block;margin-bottom:3px}
.cand-box span{font-size:14px;font-weight:600;color:var(--accent)}
.notes-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-top:10px}
.notes-box label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:4px}
.notes-box p{font-size:13px;color:var(--text2);line-height:1.5}

/* DASHBOARD */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.metric-val{font-size:28px;font-weight:700;color:var(--text)}
.metric-sub{font-size:12px;color:var(--text3);margin-top:2px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.sec{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar-lbl{min-width:50px;font-size:12px;color:var(--text2);text-align:right}
.bar-track{flex:1;height:16px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.bar-val{min-width:28px;font-size:12px;color:var(--text2)}
.bar-sub{font-size:10px;color:var(--text3)}

/* CARGAS */
.ct-wrap{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
.ct{width:100%;border-collapse:collapse;font-size:13px}
.ct th{padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-weight:700;font-size:11px;text-align:center;color:var(--text2)}
.ct th.left{text-align:left}
.ct td{padding:8px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:13px}
.ct td:last-child,.ct th:last-child{border-right:none}
.ct td.name{font-weight:600;text-align:left;background:var(--surface)}
.ct td.total{font-weight:700;background:var(--surface2)}
.ct tr:last-child td{border-bottom:none}
.ct tr.total-row td{font-weight:700;border-top:2px solid var(--border2);background:var(--surface2)}
.pond-hi{background:var(--amber-bg);color:var(--amber);border-radius:99px;padding:2px 8px;font-weight:700;font-size:12px}
.pond-md{background:var(--blue-bg);color:var(--blue);border-radius:99px;padding:2px 8px;font-weight:700;font-size:12px}
.pond-lo{background:var(--accent-bg);color:var(--accent);border-radius:99px;padding:2px 8px;font-weight:700;font-size:12px}

/* TIEMPOS */
.t-table{width:100%;border-collapse:collapse;font-size:13px}
.t-table th{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);font-weight:700;font-size:11px;text-align:center;color:var(--text2)}
.t-table th.left{text-align:left}
.t-table td{padding:6px 10px;border:1px solid var(--border);text-align:center}
.t-table td.left{text-align:left}
.t-table tr.tot td{font-weight:700;background:var(--surface2)}
.t-bar{height:10px;border-radius:2px;background:var(--accent);display:inline-block;vertical-align:middle;margin-left:6px}

/* SETTINGS modal */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag-item{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600}
.tag-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 2px;border-radius:3px}
.tag-del:hover{color:var(--red)}
.tag-add{display:flex;gap:6px}
.tag-add input{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none}
.tag-add input:focus{border-color:var(--accent)}
.tag-add button{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600}

/* SORTIND */
.si{font-size:9px;margin-left:2px;color:var(--accent)}

@media(max-width:700px){
  .dash-grid{grid-template-columns:1fr}
  .topbar{height:auto;padding:8px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Puelche <span>HC</span></div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('procesos',this)">Procesos</button>

    <button class="tab" onclick="setTab('cargas',this)">Cargas</button>
    <button class="tab" onclick="setTab('tiempos',this)">Tiempos</button>
    <button class="tab" onclick="setTab('cierres',this)">Cierres</button>
  </div>
  <button class="btn" onclick="openSettings()" title="Gestionar consultoras y apoyos">⚙ Consultoras</button>
  <button class="btn btn-primary" onclick="openNew()">+ Nuevo</button>
</div>
<div id="status-bar" style="display:none;padding:8px 20px;font-size:13px;font-weight:500;transition:all .3s"></div>

<div class="filters" id="filter-bar">
  <div style="position:relative;display:inline-block">
    <button id="f-etapa-btn" onclick="toggleEtapaMenu()" style="height:32px;padding:0 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;min-width:140px;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span id="f-etapa-label">Activos</span><span>▾</span>
    </button>
    <div id="f-etapa-menu" style="display:none;position:absolute;top:36px;left:0;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:220px;padding:4px 0">
      <!-- Grupo Todos -->
      <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600">
        <input type="checkbox" id="et-all" onchange="etapaGroupChanged('all')"> Todos los procesos
      </label>
      <hr style="margin:2px 0;border:none;border-top:1px solid var(--border)">
      <!-- Grupo Activos -->
      <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--accent)">
        <input type="checkbox" id="et-grp-activo" checked onchange="etapaGroupChanged('activo')"> Activos
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-activo" value="Inicio" checked onchange="etapaCbChanged()"> Inicio
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-activo" value="Medio" checked onchange="etapaCbChanged()"> Medio
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-activo" value="Final" checked onchange="etapaCbChanged()"> Final
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-activo" value="Esperando Aprobación" checked onchange="etapaCbChanged()"> Esp. Aprobación
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-activo" value="Stand By" checked onchange="etapaCbChanged()"> Stand By
      </label>
      <hr style="margin:2px 0;border:none;border-top:1px solid var(--border)">
      <!-- Grupo Inactivos -->
      <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2)">
        <input type="checkbox" id="et-grp-inactivo" onchange="etapaGroupChanged('inactivo')"> Inactivos
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-inactivo" value="Cerrado" onchange="etapaCbChanged()"> Cerrado
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-inactivo" value="Suspendido" onchange="etapaCbChanged()"> Suspendido
      </label>
      <label style="display:flex;align-items:center;gap:8px;padding:4px 12px 4px 28px;cursor:pointer;font-size:12px">
        <input type="checkbox" class="et-cb et-inactivo" value="" onchange="etapaCbChanged()"> Sin etapa
      </label>
    </div>
  </div>
  <select id="f-cons" onchange="render()"><option value="">Todas las consultoras</option></select>
  <select id="f-apoyo" onchange="render()"><option value="">Todos los apoyos</option></select>
  <select id="f-rep" onchange="render()">
    <option value="">Reposición: Todos</option>
    <option value="SI">Reposición: Sí</option>
    <option value="NO">Reposición: No</option>
  </select>
  <select id="f-tipo" onchange="render()">
    <option value="">Todos los tipos</option>
    <option value="Gerente">Gerente</option>
    <option value="Jefatura">Jefatura</option>
    <option value="Profesional">Profesional</option>
  </select>
  <input type="text" id="f-search" placeholder="Buscar empresa o cargo..." oninput="render()" style="flex:1;min-width:140px;max-width:280px">
  <span class="cnt" id="cnt"></span>
</div>
<div id="cierres-bar" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:none;gap:8px;align-items:center">
  <input type="text" id="c-search" placeholder="Buscar empresa, cargo o candidato..." oninput="render()" style="min-width:240px;max-width:380px;font-size:13px;padding:5px 9px;height:32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none">
  <span style="font-size:12px;color:var(--text3)" id="c-cnt"></span>
</div>

<div id="main-content" class="content"></div>

<!-- NUEVO PROCESO -->
<div class="overlay" id="ov-new">
<div class="modal">
  <div class="modal-hdr"><div class="modal-title">Nuevo proceso</div><button class="mc" onclick="closeNew()">×</button></div>
  <div class="nf"><label>Empresa</label><input id="n-emp" placeholder="Ej: CERMAQ"></div>
  <div class="nf"><label>Cargo</label><input id="n-proc" placeholder="Ej: Gerente de Operaciones"></div>
  <div class="nf"><label>Tipo de cargo</label>
    <select id="n-tipo"><option value="">— Sin tipo —</option><option value="Gerente">Gerente</option><option value="Jefatura">Jefatura</option><option value="Profesional">Profesional</option></select>
  </div>
  <div class="nf"><label>Consultora 1</label><select id="n-c1"><option value="">— Sin asignar —</option></select></div>
  <div class="nf"><label>Consultora 2 (opcional)</label><select id="n-c2"><option value="">— Sin segunda —</option></select></div>
  <div class="nf"><label>Apoyo</label><select id="n-ap"><option value="">— Sin apoyo —</option></select></div>
  <div class="nf"><label>Etapa</label>
    <select id="n-et"><option value="">— Sin etapa —</option><option value="Esperando Aprobación">Esperando Aprobación</option><option value="Stand By">Stand By</option><option value="Inicio">Inicio</option><option value="Medio">Medio</option><option value="Final">Final</option></select>
  </div>
  <div class="nf"><label>¿Es reposición?</label>
    <select id="n-rep"><option value="NO" selected>No</option><option value="SI">Sí</option></select>
  </div>
  <div class="fa">
    <button class="btn" onclick="closeNew()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveNew()">Crear proceso</button>
  </div>
</div>
</div>

<!-- EDITAR (cierre completo) -->
<div class="overlay" id="ov-edit">
<div class="modal" style="max-width:480px">
  <div class="modal-hdr"><div class="modal-title">Cerrar proceso</div><button class="mc" onclick="closeEdit()">×</button></div>

// ─── WORKDAY: +N días hábiles (lun-vie) ────────────────────────────────────
function workday(dateStr, days){
  if(!dateStr) return null;
  let d = new Date(dateStr);
  let added = 0;
  while(added < days){
    d.setDate(d.getDate()+1);
    const dow = d.getDay();
    if(dow!==0 && dow!==6) added++;
  }
  return d.toISOString().split('T')[0];
}

// Auto-calc Long List when aprobación perfil is set
function calcLL(apr){ return workday(apr, 10); }
// Carga: 1.25 for Gerente, 1 otherwise
function calcCarga(r){ return (r.tipo==='Gerente' || (r.n && r.n>1)) ? 1.25 : 1.0; }

// ─── HELPERS ────────────────────────────────────────────────────────────────
function fmtDate(d){
  if(!d)return'';
  try{const p=d.split('-');return`${p[2]}/${p[1]}/${p[0].slice(2)}`;}catch{return '';}
}
function etapaBadge(et, full){
  const m={Cerrado:'b-cerrado',Suspendido:'b-suspendido',Inicio:'b-inicio',Medio:'b-medio',Final:'b-final','Esperando Aprobación':'b-aprobacion','Stand By':'b-aprobacion'};
  const label = (et==='Esperando Aprobación' && !full) ? 'Esp. Aprob.' : (et==='Stand By' && !full) ? 'Stand By' : (et||'—');
  return`<span class="badge ${m[et]||'b-vacio'}">${label}</span>`;
}
function pills(c1,c2,ap){
  return(c1?`<span class="cons-pill">${c1}</span>`:'')+(c2?`<span class="cons-pill">${c2}</span>`:'')+(ap?`<span class="cons-pill ap">${ap}</span>`:'');
}

// ─── SELECTS ────────────────────────────────────────────────────────────────
function fillSel(id,opts){
  const el=document.getElementById(id); if(!el)return;
  while(el.options.length>1)el.remove(1);
  opts.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=`${k} — ${CMAP(k)}`;el.appendChild(o);});
}
function initSelects(){
  fillSel('n-c1',CONS_OPTS()); fillSel('n-c2',CONS_OPTS()); fillSel('n-ap',APOYO_OPTS());

  const fc=document.getElementById('f-cons');

}

// ─── COMMIT CELL ────────────────────────────────────────────────────────────
function commitCell(rowId,field,value){
  const r=DATA.find(x=>x.id===rowId); if(!r)return;
  r[field]=value;
  // Auto-update Status based on Etapa
  if(field==='et'){
    const ACTIVAS=['Inicio','Medio','Final','Esperando Aprobación','Stand By'];
    r.st = ACTIVAS.includes(value) ? 'Activo' : 'Inactivo';
    if(value==='Cerrado'){
      activeCell=null;
      openEdit(rowId);
      return;
    }
  }
  // Auto-calc Long List from Aprobación Perfil
  if(field==='apr'){
    r.ll = calcLL(value);
  }
  // Auto-calc duration
  if((field==='fi'||field==='lp')&&r.fi&&r.lp){
    const d=Math.round((new Date(r.fi)-new Date(r.lp))/86400000);
    if(d>0){r.dur=d;const dt=new Date(r.fi);r.mc=dt.getMonth()+1;r.ac=dt.getFullYear();}
  }
  activeCell=null; render();
  saveToSheets(r); // Auto-save to Sheets
}

// ─── EDIT MODAL (al cerrar proceso) ──────────────────────────────────────────
let editingId=null;
function openEdit(id){
  editingId=id;
  const r=DATA.find(x=>x.id===id); if(!r)return;
  document.getElementById('e-title').textContent=r.proc+' — '+r.emp;
  document.getElementById('e-cand').value=r.cand||'';
  document.getElementById('e-fco').value=r.fco||'';
  document.getElementById('e-fi').value=r.fi||'';
  document.getElementById('ov-edit').classList.add('open');
  render();
}
function closeEdit(){
  document.getElementById('ov-edit').classList.remove('open');
  editingId=null;
  render();
}
function saveEdit(){
  const r=DATA.find(x=>x.id===editingId); if(!r){closeEdit();return;}
  r.cand=document.getElementById('e-cand').value.trim();
  r.fco=document.getElementById('e-fco').value||null;
  r.fi=document.getElementById('e-fi').value||null;
  if(r.fi&&r.lp){
    const d=Math.round((new Date(r.fi)-new Date(r.lp))/86400000);
    if(d>0){r.dur=d;const dt=new Date(r.fi);r.mc=dt.getMonth()+1;r.ac=dt.getFullYear();}
  }
  saveToSheets(r); // Save to Sheets
  closeEdit();
}

// ─── INLINE CELL ────────────────────────────────────────────────────────────
function makeCell(rowId,field,display,editType,opts=null){
  const isActive=activeCell&&activeCell.rowId===rowId&&activeCell.field===field;
  const r=DATA.find(x=>x.id===rowId);
  if(isActive){
    if(editType==='text'){
      const val=(r[field]||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      return`<td><div class="cell"><input class="cell-input" value="${val}" id="ci-${rowId}-${field}" onkeydown="if(event.key==='Enter'){commitCell(${rowId},'${field}',this.value);}if(event.key==='Escape'){activeCell=null;render();}"></div></td>`;
    }
    if(editType==='date'){
      const val=r[field]||'';
      return`<td><div class="cell"><input type="date" class="cell-date" value="${val}" id="ci-${rowId}-${field}" onchange="commitCell(${rowId},'${field}',this.value||null)" onkeydown="if(event.key==='Escape'){activeCell=null;render();}"></div></td>`;
    }
    if(editType==='select'){
      const val=r[field]||'';
      const oh=opts.map(o=>`<option value="${o}"${o===val?' selected':''}>${o||'—'}</option>`).join('');
      return`<td><div class="cell"><select class="cell-select" id="ci-${rowId}-${field}" onchange="commitCell(${rowId},'${field}',this.value)"  onkeydown="if(event.key==='Escape'){activeCell=null;render();}">${oh}</select></div></td>`;
    }
    if(editType==='cons'){
      const mkO=(arr,f2)=>arr.map(o=>`<option value="${o}"${o===(r[f2]||'')?' selected':''}>${o} — ${CMAP(o)}</option>`).join('');
      return`<td><div class="cons-editor">
        <div class="cons-row"><span class="cons-lbl">1ª</span><select class="cell-select" onchange="commitCell(${rowId},'c1',this.value)"><option value="">—</option>${mkO(CONS_OPTS(),'c1')}</select></div>
        <div class="cons-row"><span class="cons-lbl">2ª</span><select class="cell-select" onchange="commitCell(${rowId},'c2',this.value)"><option value="">—</option>${mkO(CONS_OPTS(),'c2')}</select></div>
        <div class="cons-row"><span class="cons-lbl">Ap</span><select class="cell-select" onchange="commitCell(${rowId},'ap',this.value)"><option value="">—</option>${mkO(APOYO_OPTS(),'ap')}</select></div>
      </div></td>`;
    }
  }
  return`<td class="editable" onclick="activeCell={rowId:${rowId},field:'${field}'};render()"><div class="cell">${display||'<span class="hint">—</span>'}</div></td>`;
}

// ─── DETAIL ─────────────────────────────────────────────────────────────────
function openDetail(id){
  const r=DATA.find(x=>x.id===id); if(!r)return;
  document.getElementById('d-title').textContent=r.proc;
  document.getElementById('d-sub').textContent=r.emp+(r.tipo?' · '+r.tipo:'');
  const steps=[
    {l:'Acept. Propuesta',d:r.acep},
    {l:'Lev. Perfil',d:r.lp},
    {l:'Aprob. Perfil',d:r.apr},
    {l:'Long List',d:r.ll},
    {l:'Firma CO',d:r.fco},
    {l:'Ingreso',d:r.fi},
  ];
  const lastDone=steps.reduce((a,s,i)=>s.d?i:a,-1);
  let tlHTML=`<div class="tl-wrap"><div class="tl">`;
  steps.forEach((s,i)=>{
    const done=!!s.d, next=!done&&i===lastDone+1;
    if(i>0) tlHTML+=`<div class="tl-line${i<=lastDone?' done':''}"></div>`;
    tlHTML+=`<div class="tl-step"><div class="tl-dot${done?' done':next?' next':''}"></div><div class="tl-lbl">${s.l}</div><div class="tl-dt">${fmtDate(s.d)||'—'}</div></div>`;
  });
  tlHTML+=`</div></div>`;
  const df=(lbl,val)=>`<div class="d-field"><label>${lbl}</label><span>${val||'—'}</span></div>`;
  document.getElementById('d-body').innerHTML=`
    <div style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap">${etapaBadge(r.et,true)}<span class="badge ${r.st==='Activo'?'b-activo':'b-vacio'}">${r.st}</span>${r.rep==='SI'?'<span class="badge b-suspendido">Reposición</span>':''}</div>
    ${tlHTML}
    <div class="d-grid">${df('Consultora 1',r.c1?r.c1+' — '+CMAP(r.c1):null)}${df('Consultora 2',r.c2?r.c2+' — '+CMAP(r.c2):null)}${df('Apoyo',r.ap?r.ap+' — '+CMAP(r.ap):null)}</div>
    ${r.cand?`<div class="cand-box"><label>Candidato seleccionado</label><span>${r.cand}</span></div>`:''}
    ${r.dur&&r.dur<500?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Duración: <strong>${r.dur} días</strong>${r.mc?' · Cierre '+r.mc+'/'+r.ac:''}</div>`:''}
    ${r.sp?`<div class="notes-box"><label>Notas</label><p>${r.sp}</p></div>`:''}
  `;
  document.getElementById('ov-detail').classList.add('open');
}

    if(cons&&r.c1!==cons&&r.c2!==cons)return false;
    if(apoyo&&r.ap!==apoyo)return false;
    if(rep && (r.rep||'NO')!==rep) return false;
    if(tipo && r.tipo!==tipo) return false;
    if(q&&!r.emp.toLowerCase().includes(q)&&!r.proc.toLowerCase().includes(q))return false;
    return true;
  });
}

function updateEtapaLabel(){
  const lbl=document.getElementById('f-etapa-label');
  if(!lbl) return;
  const activoCbs=[...document.querySelectorAll('.et-activo')];
  const inactivoCbs=[...document.querySelectorAll('.et-inactivo')];
  const activoAll=activoCbs.every(cb=>cb.checked);

  const inactivoAll=inactivoCbs.every(cb=>cb.checked);
  const inactivoNone=inactivoCbs.every(cb=>!cb.checked);
  const allChecked=[...document.querySelectorAll('.et-cb')].every(cb=>cb.checked);
  if(allChecked){ lbl.textContent='Todos'; return; }
  if(activoAll && inactivoNone){ lbl.textContent='Activos'; return; }

function renderCargas(){
  // Activos = Status Activo (Inicio/Medio/Final/Esperando Aprobación)
  const activos = DATA.filter(r => r.st === 'Activo');

  // Multiplicadores por etapa (Esperando Aprobación cuenta como Inicio para ponderado)
  const etMult = {Inicio:1.0, Medio:0.7, Final:0.2};

  // Ponderado de una persona como consultora en un proceso
  // Si hay 2 consultoras → divide por 2
  function pondCons(r, k){
    const mult = etMult[r.et] || 0;
    const carga = calcCarga(r);
    const hasTwoCons = !!(r.c1 && r.c2);
    return carga * mult * (hasTwoCons ? 0.5 : 1.0);
  }

  // Ponderado de una persona como apoyo en un proceso
  function pondApoyo(r){
    const mult = etMult[r.et] || 0;
    const carga = calcCarga(r);
    return carga * mult;
  }

  // ── Calcular stats por persona ──────────────────────────────────────────
  function statsForKey(k){
    const EA = 'Esperando Aprobación';
    const SB = 'Stand By';
    // Exclude EA and SB from both count and ponderado
    const asCons  = activos.filter(r => (r.c1===k || r.c2===k) && r.et!==EA && r.et!==SB);
    const asApoyo = activos.filter(r => r.ap===k && r.et!==EA && r.et!==SB);
    const consPond  = asCons.reduce((a,r) => a + pondCons(r,k), 0);
    const apoyoPond = asApoyo.reduce((a,r) => a + pondApoyo(r), 0);
    return {
      consTot:  asCons.length,
      apTot:    asApoyo.length,
      consPond,
      apoyoPond,
      totalPond: consPond + apoyoPond,
    };
  }

  // ── Tabla Consultoras ───────────────────────────────────────────────────
  // Total único = procesos activos con al menos una consultora asignada
  const EA_SB = ['Esperando Aprobación','Stand By'];
  const totConsProcUniq = activos.filter(r => (r.c1 || r.c2) && !EA_SB.includes(r.et)).length;
  let totConsPond = 0;
  const consRows = CONSULTORAS.map(p => {
    const s = statsForKey(p.k);
    if(!s.consTot) return ''; // ocultar si no tiene procesos activos
    totConsPond += s.consPond;
    const cls = s.consPond>=6?'pond-hi':s.consPond>=3?'pond-md':'pond-lo';
    return `<tr><td class="name">${p.k} — ${p.n}</td>
      <td class="total">${s.consTot}</td>
      <td class="total"><span class="${cls}">${s.consPond.toFixed(1)}</span></td>
    </tr>`;
  }).join('');
  const totCls = totConsPond>=10?'pond-hi':totConsPond>=6?'pond-md':'pond-lo';

  // ── Tabla Apoyos ────────────────────────────────────────────────────────
  const uniqueApoyos = APOYOS.filter((v,i,a) => a.findIndex(x=>x.k===v.k)===i);
  const totApProcUniq = activos.filter(r => r.ap && !EA_SB.includes(r.et)).length;
  let totApPond = 0;
  const apRows = uniqueApoyos.map(p => {
    const s = statsForKey(p.k);
    if(!s.apTot) return ''; // ocultar si no tiene procesos activos
    totApPond += s.apoyoPond;
    const cls = s.apoyoPond>=6?'pond-hi':s.apoyoPond>=3?'pond-md':'pond-lo';
    return `<tr><td class="name">${p.k} — ${p.n}</td>
      <td class="total">${s.apTot}</td>
      <td class="total"><span class="${cls}">${s.apoyoPond.toFixed(1)}</span></td>
    </tr>`;
  }).join('');
  const totApCls = totApPond>=10?'pond-hi':totApPond>=6?'pond-md':'pond-lo';

  // ── Tabla Combinada ─────────────────────────────────────────────────────
  const allKeys = [...new Set([...CONSULTORAS.map(c=>c.k), ...APOYOS.map(a=>a.k)])];
  let totCombiProc = 0, totCombiPond = 0;
  const combiRows = allKeys.map(k => {
    const s = statsForKey(k);
    if(!s.consTot && !s.apTot) return ''; // ocultar si no tiene procesos activos
    totCombiProc += s.consTot + s.apTot;
    totCombiPond += s.totalPond;
    const nombre = [...CONSULTORAS,...APOYOS].find(x=>x.k===k)?.n || k;
    const cls = s.totalPond>=6?'pond-hi':s.totalPond>=3?'pond-md':'pond-lo';
    return `<tr><td class="name">${k} — ${nombre}</td>
      <td class="total">${s.consTot}</td>
      <td class="total">${s.apTot}</td>
      <td class="total">${s.consTot + s.apTot}</td>
      <td class="total"><span class="${cls}">${s.totalPond.toFixed(1)}</span></td>
    </tr>`;
  }).join('');
  const totCombiCls = totCombiPond>=10?'pond-hi':totCombiPond>=6?'pond-md':'pond-lo';

  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div>
      <div class="sec">Consultoras</div>
      <div class="ct-wrap"><table class="ct">
        <thead><tr><th class="left">Nombre</th><th>Total proc.</th><th>Ponderado</th></tr></thead>
        <tbody>${consRows}<tr class="total-row"><td class="name">Total</td><td class="total">${totConsProcUniq}</td><td class="total"><span class="${totCls}">${totConsPond.toFixed(1)}</span></td></tr></tbody>
      </table></div>
    </div>
    <div>
      <div class="sec">Apoyos</div>
      <div class="ct-wrap"><table class="ct">
        <thead><tr><th class="left">Nombre</th><th>Total proc.</th><th>Ponderado</th></tr></thead>
        <tbody>${apRows}<tr class="total-row"><td class="name">Total</td><td class="total">${totApProcUniq}</td><td class="total"><span class="${totApCls}">${totApPond.toFixed(1)}</span></td></tr></tbody>
      </table></div>
    </div>
  </div>
  <div class="sec">Resumen combinado (consultora + apoyo)</div>
  <div class="ct-wrap"><table class="ct">
    <thead><tr><th class="left">Nombre</th><th>Como consultora</th><th>Como apoyo</th><th>Total</th><th>Ponderado total</th></tr></thead>
    <tbody>${combiRows}</tbody>
  </table></div>
  <div style="font-size:11px;color:var(--text3);margin-top:8px">
    Ponderado: Inicio × 1.0 · Medio × 0.7 · Final × 0.2 · Carga Gerente × 1.25 · Si hay 2 consultoras el ponderado se divide en 2 · Esperando Aprobación y Stand By se excluyen
  </div>`;
}

      </table></div>
    </div>

      <div class="sec">Por mes — ${curYear}</div>
      <div class="ct-wrap"><table class="t-table" style="font-size:12px">
        <thead><tr><th class="left" style="padding:6px 8px">Mes</th><th style="padding:6px 8px">N°</th><th class="left" style="padding:6px 8px">Prom.</th><th style="padding:6px 8px">Mín</th><th style="padding:6px 8px">Máx</th></tr></thead>

}


function openSettings(){
  renderTags();
  document.getElementById('ov-settings').classList.add('open');
}
function renderTags(){
  document.getElementById('tag-cons').innerHTML=CONSULTORAS.map((p,i)=>
    `<div class="tag-item">${p.k} — ${p.n}<button class="tag-del" onclick="CONSULTORAS.splice(${i},1);renderTags()">×</button></div>`
  ).join('');
  document.getElementById('tag-ap').innerHTML=APOYOS.map((p,i)=>
    `<div class="tag-item">${p.k} — ${p.n}<button class="tag-del" onclick="APOYOS.splice(${i},1);renderTags()">×</button></div>`

function addPerson(type){
  const keyId=type==='cons'?'new-cons-key':'new-ap-key';
  const nameId=type==='cons'?'new-cons-name':'new-ap-name';
  const k=document.getElementById(keyId).value.trim();
  const n=document.getElementById(nameId).value.trim();
  if(!k||!n){alert('Ingresa sigla y nombre.');return;}
  if(type==='cons') CONSULTORAS.push({k,n});
  else APOYOS.push({k,n});
  document.getElementById(keyId).value='';
  document.getElementById(nameId).value='';
  renderTags();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
let cierreSortCol='fco', cierreSortDir=-1;
function sortCierreBy(col){
  if(cierreSortCol===col) cierreSortDir*=-1; else {cierreSortCol=col; cierreSortDir=1;}
  render();
}
function renderCierres(){
  const today = new Date();
  const q = (document.getElementById('c-search') ? document.getElementById('c-search').value : '').toLowerCase();
  let cierres = DATA.filter(r => r.et==='Cerrado');
  if(q) cierres = cierres.filter(r => r.emp.toLowerCase().includes(q) || r.proc.toLowerCase().includes(q) || (r.cand||'').toLowerCase().includes(q));

  cierres = cierres.map(r=>{
    let dias = null;
    if(r.fi){
      const d = Math.round((today - new Date(r.fi)) / 86400000);
      dias = (d >= -3650 && d <= 3650) ? d : null; // guard against malformed dates
    }
    return {...r, diasDesdeIngreso: dias};
  });

  const inRange = r => r.diasDesdeIngreso!==null && r.diasDesdeIngreso>=80 && r.diasDesdeIngreso<=100;
  const missingDates = r => !r.fco && !r.fi;
  const sorted = [...cierres].sort((a,b)=>{
    // Only the 80-100 days range is pinned to top; missing-dates rows sort normally (just highlighted red)
    const aHi = inRange(a), bHi = inRange(b);
    if(aHi && !bHi) return -1;
    if(!aHi && bHi) return 1;
    let va, vb;
    if(cierreSortCol==='diasDesdeIngreso'){ va=a.diasDesdeIngreso; vb=b.diasDesdeIngreso; }
    else { va=a[cierreSortCol]; vb=b[cierreSortCol]; }
    if(va===null||va===undefined||va==='') return 1;
    if(vb===null||vb===undefined||vb==='') return -1;
    if(typeof va==='string'){ va=va.toLowerCase(); vb=(vb||'').toLowerCase(); }
    return va<vb?-cierreSortDir:va>vb?cierreSortDir:0;
  });

  const si = c => c===cierreSortCol?`<span class="si">${cierreSortDir>0?'▲':'▼'}</span>`:'';

  // Update count badge in the fixed cierres bar
  const cntEl = document.getElementById('c-cnt');
  if(cntEl) cntEl.textContent = sorted.length + ' procesos cerrados';
  const searchBar = ''; // Search bar is now in the fixed bar above

  if(!sorted.length) return `<div style="text-align:center;padding:48px;color:var(--text3)">No hay procesos cerrados con los filtros actuales</div>`;

  const rows = sorted.map(r=>{
    const hi = inRange(r);
    const miss = missingDates(r);
    const rowStyle = miss ? ' style="background:var(--red-bg)"' : hi ? ' style="background:var(--amber-bg)"' : '';
    const alertIcon = miss ? '<span title="Falta Firma CO y Fecha de Ingreso" style="color:var(--red);margin-right:5px;font-weight:700">⚠</span>' : '';
    return `<tr${rowStyle}>
    <td style="cursor:pointer" onclick="openDetail(${r.id})"><div class="cell">${alertIcon}<strong>${r.emp}</strong></div></td>
    <td style="cursor:pointer" onclick="openDetail(${r.id})"><div class="cell" style="color:var(--text2)">${r.proc}</div></td>
    <td><div class="cell"><span style="color:var(--blue);font-weight:600">${r.cand||'<span class="hint">—</span>'}</span></div></td>
    <td><div class="cell">${fmtDate(r.fco)||(miss?'<span style="color:var(--red);font-weight:600">Falta</span>':'<span class="hint">—</span>')}</div></td>
    <td><div class="cell">${fmtDate(r.fi)||(miss?'<span style="color:var(--red);font-weight:600">Falta</span>':'<span class="hint">—</span>')}</div></td>
    <td><div class="cell">${r.diasDesdeIngreso!==null?r.diasDesdeIngreso+' días':'<span class="hint">—</span>'}</div></td>
    <td><div class="cell">${hi?'<span class="badge b-aprobacion">Contactar</span>':''}</div></td>
  </tr>`;
  }).join('');

  return `<div class="table-wrap"><table>
    <thead><tr>
      <th class="sort" onclick="sortCierreBy('emp')">Empresa ${si('emp')}</th>
      <th class="sort" onclick="sortCierreBy('proc')">Cargo ${si('proc')}</th>
      <th class="sort" onclick="sortCierreBy('cand')">Candidato ${si('cand')}</th>
      <th class="sort" onclick="sortCierreBy('fco')">Fecha cierre (Firma CO) ${si('fco')}</th>
      <th class="sort" onclick="sortCierreBy('fi')">Fecha Ingreso ${si('fi')}</th>
      <th class="sort" onclick="sortCierreBy('diasDesdeIngreso')">Días desde ingreso ${si('diasDesdeIngreso')}</th>
      <th>Contactar</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function render(){
  const c=document.getElementById('main-content');
  // Preserve scroll position of table-wrap before re-render
  const tw=c.querySelector('.table-wrap');
  const scrollTop=tw?tw.scrollTop:0;

  if(curTab==='procesos') c.innerHTML=renderProcesos();
  else if(curTab==='cargas') c.innerHTML=renderCargas();
  else if(curTab==='tiempos') c.innerHTML=renderTiempos();
  else if(curTab==='cierres') c.innerHTML=renderCierres();

  // Restore scroll position
  const tw2=c.querySelector('.table-wrap');
  if(tw2 && scrollTop) tw2.scrollTop=scrollTop;

  if(activeCell){
    const el=document.getElementById(`ci-${activeCell.rowId}-${activeCell.field}`);
    if(el){el.focus();if(el.select)el.select();}
  }
}

// ─── NEW / CLOSE ─────────────────────────────────────────────────────────────
function openNew(){document.getElementById('ov-new').classList.add('open');}
function closeNew(){document.getElementById('ov-new').classList.remove('open');}
function saveNew(){
  const emp=document.getElementById('n-emp').value.trim();
  const proc=document.getElementById('n-proc').value.trim();
  if(!emp||!proc){alert('Empresa y cargo son obligatorios.');return;}
  const tipo=document.getElementById('n-tipo').value;
  const rep=document.getElementById('n-rep').value;
  DATA.push({id:nextId++,emp,proc,tipo,c1:document.getElementById('n-c1').value,c2:document.getElementById('n-c2').value,ap:document.getElementById('n-ap').value,st:'Activo',et:document.getElementById('n-et').value,rep,acep:null,lp:null,apr:null,ll:null,fco:null,fi:null,cand:'',sp:'',dur:null,mc:null,ac:null});
  closeNew();
  saveToSheets(DATA[DATA.length-1]); // Save new record to Sheets
  ['n-emp','n-proc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-rep').value='NO';
  ['n-tipo','n-c1','n-c2','n-ap','n-et'].forEach(id=>document.getElementById(id).value='');

}

// ─── PERSISTENCIA — Google Sheets Backend ─────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1w10s6zmnZAPXvhLGNKwTiAc9brrzZHX2eiV9qbRYIuh3pFtxxO6NJlGmJaJTIvEz/exec';
let isSaving = false;

function showStatus(msg, type='info') {
  let bar = document.getElementById('status-bar');
  if (!bar) return;
  bar.textContent = msg;
  bar.style.background = type==='error' ? '#FAE5E5' : type==='ok' ? '#E5F4EE' : '#FDF0D8';
  bar.style.color = type==='error' ? '#8F1A1A' : type==='ok' ? '#0F6E56' : '#7A4F0A';
  bar.style.display = 'block';
  if (type !== 'loading') setTimeout(() => bar.style.display='none', 3000);
}

async function loadFromSheets() {
  showStatus('Cargando datos desde Google Sheets...', 'loading');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    // Convert sheet records to app format
    DATA = json.records.map(r => ({
      id: Number(r.id),
      emp: r.Empresa || '',
      proc: r.Cargo || '',
      tipo: r.Tipo || '',
      n: r.N ? Number(r.N) : null,
      c1: r.Consultora1 || '',
      c2: r.Consultora2 || '',
      ap: r.Apoyo || '',
      st: r.Status || 'Activo',
      et: r.Etapa || '',
      rep: r.Reposicion || '',
      acep: r.AceptacionPropuesta || null,
      lp: r.LevantamientoPerfil || null,
      apr: r.AprobacionPerfil || null,
      ll: r.LongList || null,
      fco: r.FirmaCO || null,
      fi: r.FechaIngreso || null,
      cand: r.CandidatoSeleccionado || '',
      sp: r.Notas || '',
      dur: r.Duracion ? Number(r.Duracion) : null,
      mc: r.MesCierre ? Number(r.MesCierre) : null,
      ac: r.AnioCierre ? Number(r.AnioCierre) : null,
    }));

    nextId = Math.max(...DATA.map(r => r.id), 0) + 1;
    initSelects();
    render();
    showStatus('Datos cargados ✓', 'ok');
  } catch(err) {
    showStatus('Error cargando datos: ' + err.message, 'error');
    console.error(err);
    // Fall back to embedded data
    initSelects();
    render();
  }
}

async function saveToSheets(record) {
  isSaving = true;
  showStatus('Guardando...', 'loading');
  try {
    // Convert app record to sheet format
    const sheetRecord = {
      id: record.id,
      Empresa: record.emp,
      Cargo: record.proc,
      Tipo: record.tipo,
      N: record.n || '',
      Consultora1: record.c1,
      Consultora2: record.c2,
      Apoyo: record.ap,
      Status: record.st,
      Etapa: record.et,
      Reposicion: record.rep,
      AceptacionPropuesta: record.acep || '',
      LevantamientoPerfil: record.lp || '',
      AprobacionPerfil: record.apr || '',
      LongList: record.ll || '',
      FirmaCO: record.fco || '',
      FechaIngreso: record.fi || '',
      CandidatoSeleccionado: record.cand,
      Notas: record.sp,
      Duracion: record.dur || '',
      MesCierre: record.mc || '',
      AnioCierre: record.ac || '',
    };
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', record: sheetRecord }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    showStatus('Guardado ✓', 'ok');
  } catch(err) {
    showStatus('Error al guardar: ' + err.message, 'error');
    console.error(err);
  } finally {
    isSaving = false;
  }
}

async function deleteFromSheets(id) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
  } catch(err) {
    showStatus('Error al eliminar: ' + err.message, 'error');
    console.error(err);
  }
}

// ─── CLOSE CELL ON OUTSIDE CLICK ────────────────────────────────────────────
document.addEventListener('mousedown', function(e){
  if(!activeCell) return;
  const activeEl = document.getElementById(`ci-${activeCell.rowId}-${activeCell.field}`);
  // Never interrupt a select element — let it open its native dropdown
  if(e.target.tagName === 'SELECT' || e.target.closest('select')) return;
  if(activeEl && activeEl.tagName === 'SELECT') return;
  // If clicking inside the active cell, do nothing
  if(activeEl && activeEl.contains(e.target)) return;
  // Clicking elsewhere — commit and close
  if(activeEl) {
    const val = activeEl.value !== undefined ? activeEl.value : activeEl.options?.[activeEl.selectedIndex]?.value;
    if(val !== undefined) commitCell(activeCell.rowId, activeCell.field, val);
    else { activeCell=null; render(); }
  } else {
    activeCell=null; render();
  }
}, true);

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromSheets(); // Carga desde Google Sheets al abrir
</script>
